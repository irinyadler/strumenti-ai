<!-- StrumentiAI logo — outline style -->
<svg width="500" height="500" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">StrumentiAI Logo</title>
  <desc id="desc">Rounded square with outlined letters A and I</desc>

  <!-- Define color once; change here to match your theme -->
  <defs>
    <linearGradient id="c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C9F7FF"/>
      <stop offset="1" stop-color="#9EEBFF"/>
    </linearGradient>
  </defs>

  <!-- Outer rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="64"
        stroke="url(#c)" stroke-width="22" fill="none" />

  <!-- Letter A (stroke-only) -->
  <path d="M155 366 L236 150 L317 366 Z"
        stroke="url(#c)" stroke-width="22" fill="none" stroke-linejoin="round"/>


  <!-- Crossbar of A -->
  <path d="M195 330 H 275"
        stroke="url(#c)" stroke-width="22" stroke-linecap="round"/>

  <!-- Letter I (rounded rectangle) -->
  <rect x="344" y="150" width="44" height="220" rx="10"
        stroke="url(#c)" stroke-width="22" fill="none"/>
</svg>
